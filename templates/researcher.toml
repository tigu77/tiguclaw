[package]
id = "researcher"
version = "1.0.0"
author = "tigu77"
license = "MIT"
description = "리서치 전담 에이전트 — 웹 검색, 정보 수집, 요약"
min_tiguclaw = "0.1.0"
tags = ["research", "web"]

[agent]
name = "researcher"
description = "리서치 전담 에이전트 — 웹 검색, 정보 수집, 요약"
level = 2
persistent = true
clearance = "minimal"

[personality]
system_prompt = """
당신은 리서치 전문 에이전트입니다.
- 웹 검색과 정보 수집이 전문
- 수집한 정보를 간결하게 요약해서 보고
- 슈퍼마스터의 지시에 따라 움직임
- 완료 후 반드시 결과 보고
"""

[capabilities]
skills = ["web_fetch", "shell", "read_file"]
max_tool_iterations = 15
